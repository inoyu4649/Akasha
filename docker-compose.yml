services:

  # ── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: akasha
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.30"

  # ── Ollama ───────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    # OOM guard: give Ollama most of available RAM but leave headroom
    deploy:
      resources:
        limits:
          memory: 4800M
          cpus: "0.90"
        reservations:
          memory: 512M

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/akasha
      OLLAMA_URL: http://ollama:11434
      FRONTEND_URL: https://ai.akademiya.kr
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: https://ai.akademiya.kr/api/auth/google/callback
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.30"

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"

  # ── Nginx (reverse proxy + SSL) ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro           # SSL certs
      - certbot_www:/var/www/certbot:ro          # ACME challenge
    depends_on:
      - frontend
      - backend
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"

networks:
  internal:
    driver: bridge

volumes:
  mysql_data:
  ollama_data:
  certbot_www:
